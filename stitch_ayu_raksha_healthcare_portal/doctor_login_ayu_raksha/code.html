<body class="bg-background min-h-screen flex items-center justify-center relative overflow-hidden">
<!-- Abstract Ambient Background to soften the clinical feel -->
<div class="absolute inset-0 z-0 opacity-40 mix-blend-multiply bg-[url('https://images.unsplash.com/photo-1550831107-1553da8c8464?q=80&amp;w=2000&amp;auto=format&amp;fit=crop')] bg-cover bg-center" data-alt="A soft, abstract representation of a pristine medical environment, featuring gentle gradients of forest green and pure white. The composition is minimal, utilizing smooth, out-of-focus organic shapes that evoke a sense of calm and precision. The lighting is bright and ethereal, perfectly complementing a premium, modern clinical interface without distracting from the foreground content.">
</div>
<!-- Centered Login Card -->
<main class="relative z-10 w-full max-w-[480px] p-6">
<div class="bg-surface-container-lowest rounded-xl shadow-[0px_8px_24px_rgba(52,92,79,0.08)] p-2xl border border-outline-variant/30 flex flex-col items-center">
<!-- Brand & Heading -->
<div class="text-center w-full mb-2xl">
<div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-primary-container text-on-primary-container mb-md">
<span class="material-symbols-outlined text-[32px]" style="font-variation-settings: 'FILL' 1;">medical_services</span>
</div>
<h1 class="font-h2 text-h2 text-primary tracking-tight">Ayu-Raksha</h1>
<h2 class="font-h3 text-h3 text-on-surface mt-sm">Healthcare Professional Login</h2>
</div>
<!-- Form -->
<form action="#" class="w-full space-y-xl" method="POST">
<div class="space-y-sm">
<label class="block font-label-bold text-label-bold text-on-surface-variant uppercase" for="email">Professional Email</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-md flex items-center pointer-events-none text-outline">
<span class="material-symbols-outlined text-[20px]">mail</span>
</div>
<input autocomplete="email" class="block w-full pl-[40px] pr-md py-md border border-outline-variant rounded-lg bg-surface-container-lowest text-on-surface font-body-md text-body-md focus:border-primary focus:ring-1 focus:ring-primary focus:outline-none transition-colors" id="email" name="email" placeholder="dr.name@clinic.com" required="" type="email"/>
</div>
</div>
<div class="space-y-sm">
<div class="flex justify-between items-center">
<label class="block font-label-bold text-label-bold text-on-surface-variant uppercase" for="password">Password</label>
</div>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-md flex items-center pointer-events-none text-outline">
<span class="material-symbols-outlined text-[20px]">lock</span>
</div>
<input autocomplete="current-password" class="block w-full pl-[40px] pr-md py-md border border-outline-variant rounded-lg bg-surface-container-lowest text-on-surface font-body-md text-body-md focus:border-primary focus:ring-1 focus:ring-primary focus:outline-none transition-colors" id="password" name="password" placeholder="••••••••" required="" type="password"/>
</div>
</div>
<div class="pt-sm">
<button class="w-full flex justify-center items-center py-md px-lg border border-transparent rounded-lg shadow-sm font-button text-button text-on-primary bg-primary hover:bg-primary/90 active:scale-[0.98] transition-all duration-200 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary" type="submit">
                        Sign in to Portal
                    </button>
</div>
</form>
<!-- Divider -->
<div class="w-full relative py-xl">
<div aria-hidden="true" class="absolute inset-0 flex items-center">
<div class="w-full border-t border-outline-variant/60"></div>
</div>
<div class="relative flex justify-center">
<span class="px-md bg-surface-container-lowest font-body-sm text-body-sm text-on-surface-variant">
                        Secure alternative
                    </span>
</div>
</div>
<!-- SSO Option -->
<button class="w-full flex justify-center items-center gap-md py-md px-lg border border-outline-variant rounded-lg font-button text-button text-on-surface bg-surface-container-lowest hover:bg-surface-container-low active:scale-[0.98] transition-all duration-200 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-outline-variant" type="button">
<svg class="w-5 h-5" fill="none" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M22.56 12.25C22.56 11.47 22.49 10.72 22.36 10H12V14.26H17.92C17.67 15.63 16.89 16.81 15.72 17.59V20.34H19.28C21.36 18.42 22.56 15.6 22.56 12.25Z" fill="#4285F4"></path>
<path d="M12 23C14.97 23 17.46 22.02 19.28 20.34L15.72 17.59C14.73 18.25 13.48 18.66 12 18.66C9.14 18.66 6.71 16.73 5.85 14.15H2.17V17C4.01 20.65 7.72 23 12 23Z" fill="#34A853"></path>
<path d="M5.85 14.15C5.63 13.5 5.5 12.77 5.5 12C5.5 11.23 5.63 10.5 5.85 9.85V7H2.17C1.41 8.52 1 10.21 1 12C1 13.79 1.41 15.48 2.17 17L5.85 14.15Z" fill="#FBBC05"></path>
<path d="M12 5.34C13.62 5.34 15.07 5.9 16.21 6.98L19.36 3.83C17.45 2.05 14.97 1 12 1C7.72 1 4.01 3.35 2.17 7L5.85 9.85C6.71 7.27 9.14 5.34 12 5.34Z" fill="#EA4335"></path>
</svg>
                Sign in with Google
            </button>
<!-- Support Link -->
<div class="mt-2xl w-full flex justify-center">
<a class="inline-flex items-center gap-xs font-button text-button text-primary hover:text-primary-container transition-colors" href="#">
<span class="material-symbols-outlined text-[18px]">help</span>
                    Provider Support
                </a>
</div>
</div>
</main>
